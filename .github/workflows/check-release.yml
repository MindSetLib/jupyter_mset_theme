name: Check Release

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -U "jupyterlab>=4,<5" editables hatchling hatch-jupyter-builder hatch-nodejs-version
          YARN_ENABLE_IMMUTABLE_INSTALLS=false jlpm install
          YARN_ENABLE_IMMUTABLE_INSTALLS=false pip install -e . --no-build-isolation

      - name: Check Release
        uses: jupyter-server/jupyter_releaser/.github/actions/check-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Distributions
        uses: actions/upload-artifact@v4
        with:
          name: jupyter_mset_theme-releaser-dist-${{ github.run_number }}
          path: .jupyter_releaser_checkout/dist
