name: Step 2 - Publish Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Target branch to publish from
        required: true
        default: main
      release_url:
        description: Optional draft GitHub Release URL
        required: false
      dry_run:
        description: Run without publishing to registries
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  publish_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "jupyterlab>=4,<5" editables hatch hatchling hatch-jupyter-builder hatch-nodejs-version build twine
          YARN_ENABLE_IMMUTABLE_INSTALLS=false jlpm install

      - name: Publish Release
        uses: jupyter-server/jupyter_releaser/.github/actions/publish-release@v2
        with:
          branch: ${{ inputs.branch }}
          release_url: ${{ inputs.release_url }}
          dry_run: ${{ inputs.dry_run }}
          token: ${{ secrets.GITHUB_TOKEN }}
          npm_token: ${{ secrets.NPM_TOKEN }}
          pypi_token: ${{ secrets.PYPI_TOKEN }}
